<!-- Supabase SDK 和客户端初始化 -->
<!-- 在 head 标签中引入 Supabase JS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- 初始化 Supabase 客户端 -->
<script>
    // 这些值会在构建时从 Hugo 参数中注入
    const SUPABASE_URL = '{{ .Site.Params.supabase.url }}';
    const SUPABASE_ANON_KEY = '{{ .Site.Params.supabase.anon_key }}';
    
    // 全局 Supabase 客户端实例
    let supabaseClient = null;
    
    // 初始化函数
    function initSupabase() {
        if (typeof window.supabase !== 'undefined' && window.supabase.createClient) {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            console.log('Supabase 客户端初始化成功');
            
            // 触发自定义事件，通知其他脚本
            window.dispatchEvent(new CustomEvent('supabase-ready', { detail: supabaseClient }));
            return true;
        } else {
            console.error('Supabase JS SDK 未加载');
            return false;
        }
    }
    
    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', function() {
        // 延迟初始化，确保 SDK 已加载
        setTimeout(initSupabase, 100);
    });
</script>
