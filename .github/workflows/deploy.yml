name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  BASE_URL: "https://fathrose.github.io/research-group-site/"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Hugo
        run: |
          wget -qO- https://github.com/gohugoio/hugo/releases/download/v0.161.1/hugo_extended_0.161.1_linux-amd64.tar.gz | tar xz
          sudo mv hugo /usr/local/bin/

      - name: Build
        run: hugo --gc --minify --baseURL "${{ env.BASE_URL }}"

      - name: Deploy
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd public
          git init
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Deploy"
          git remote add origin https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git
          git push -f origin HEAD:gh-pages
