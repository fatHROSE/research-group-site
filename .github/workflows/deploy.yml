name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git .
          git submodule update --init --recursive

      - name: Install Hugo
        run: |
          wget -q https://github.com/gohugoio/hugo/releases/download/v0.145.0/hugo_extended_0.145.0_linux-amd64.tar.gz
          tar xzf hugo_extended_0.145.0_linux-amd64.tar.gz hugo
          sudo mv hugo /usr/local/bin/
          hugo version

      - name: Build
        run: hugo --gc --minify --baseURL "https://fathrose.github.io/research-group-site/"

      - name: Push to gh-pages
        run: |
          cd public
          git init
          git config user.name "fatHROSE"
          git config user.email "fatHROSE@users.noreply.github.com"
          git add -A
          git commit -m "Deploy $(date -u)"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push -f origin HEAD:gh-pages
