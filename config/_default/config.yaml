# Hugo 站点配置
baseURL: "https://research-group-site-one.vercel.app/"
title: "生物驱动材料与功能化应用课题组"
languageCode: "zh-CN"
defaultContentLanguage: "zh"

# 启用 emoji
enableEmoji: true

# 启用 Git 信息
enableGitInfo: true

# 主题
theme: "wowchemy"

# 模块配置
module:
  imports:
    - path: github.com/wowchemy/wowchemy-hugo-themes/modules/wowchemy-bootstrap5
      mounts:
        - source: ../../assets
          target: assets
        - source: ../../layouts
          target: layouts
        - source: ../../static
          target: static
